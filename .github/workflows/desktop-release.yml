name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag: ${TAG_VERSION} | package.json: ${PACKAGE_VERSION}"
          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"

  package-windows:
    name: Package Windows x64
    needs: validate-version
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck and bundle
        run: npm run build

      - name: Package application
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npx electron-builder --win nsis --x64 --publish never && exit 0
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "Packaging failed on attempt ${attempt}; retrying in 10 seconds..."
            sleep 10
          done

      - name: Attest installer provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: cloakbrowser-desktop-windows-x64
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package-windows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: cloakbrowser-desktop-windows-x64
          path: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "CloakBrowser Desktop ${GITHUB_REF_NAME#v}" \
            --generate-notes

